<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#af3e2a" />
  <title>ГИА — выбор теста</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Тренажер  билетов</h1>
      <p>Выберите предмет и билет. В каждом билете до 16 вопросов.</p>
    </header>

    <section class="search-panel" aria-labelledby="question-search-title">
      <div class="search-head">
        <h2 id="question-search-title">Поиск по вопросам</h2>
        <p class="meta">Введите часть формулировки, чтобы найти билет с нужным вопросом.</p>
      </div>
      <label class="search-field">
        <span>Запрос</span>
        <input id="question-search" type="search" placeholder="Например: наследование, TCP, шифрование" autocomplete="off" />
      </label>
      <div id="search-results" class="search-results" aria-live="polite"></div>
    </section>

    <section id="ticket-menu" class="ticket-menu"></section>
  </main>

  <script src="./embedded-data.js"></script>
  <script src="./quiz-categories.js"></script>
  <script src="./index-page.js" defer></script>
  <script src="./pwa.js" defer></script>
</body>
</html>
